experiment:
  name: hw3_transformer_ppo
  project: mini-grp-hw3
  description: "Transformer policy fine-tuned from HW1 checkpoint with RL"

r_seed: 1337

init_checkpoint: ???         # required: path to HW1 miniGRP.pth checkpoint

rl:
  algorithm: ppo             # "ppo" or "grpo"

sim:
  task_set: "libero_spatial"
  eval_tasks: [9]
  eval_episodes: 5
  episode_length: 300
  use_fast_env: true
  fast_env_output_image: true
  reward_scale: 0.1

training:
  total_env_steps: 200000
  rollout_length: 2048       # steps collected per update
  ppo_epochs: 10
  minibatch_size: 256         # smaller for transformer memory
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coeff: 0.5
  entropy_coeff: 0.01
  max_grad_norm: 0.5
  learning_rate: 1e-5        # smaller LR for fine-tuning
  normalize_advantages: true
  normalize_rewards: false
  anneal_lr: true
  target_kl: 0             # KL divergence threshold for early stopping (0 to disable)
  value_clip_eps: 10.0

grpo:
  group_size: 8              # number of trajectories per initial state
  num_groups: 16             # number of initial states per update

value:
  hidden_dim: 256
  n_layers: 2
  learning_rate: 3e-4
  shared_network: false

eval_interval: 10000
log_interval: 1000
save_interval: 50000
